name: (GCC)Kernel Builder Xiaomi 10 Ultra

on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:

    - name: Checkout GCC Toolchain
      uses: actions/checkout@v4
      with:
        repository: CoolestEnoch/kernel-su-xiaomi-cas
        path: toolchain_repo

    - name: Install Dependencies
      run: |
        sudo apt-get purge -y snapd
        sudo apt update -y && sudo apt upgrade -y
        sudo apt install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev lib32z1-dev libssl-dev libxml2-utils xsltproc unzip bc

    - name: Download and Patch Kernel Source
      run: |
        git clone --depth 1 -b ksu https://github.com/DinhQuangDoi/android_kernel_xiaomi_cas source
        
        cd source
        
        if [ -f "./libdebuginfod.so.1" ]; then
          sudo cp ./libdebuginfod.so.1 /usr/lib/
          sudo chmod 777 /usr/lib/libdebuginfod.so.1
        fi
        
        echo "[+] Append kernel params to manual hook"
        echo "CONFIG_KSU=y" >> arch/arm64/configs/cas_defconfig
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/cas_defconfig
        echo "CONFIG_KSU_FULL_NAME_FORMAT=\"%TAG_NAME%-Lixin@%REPO_NAME%\"" >> arch/arm64/configs/cas_defconfig
        
        # Initialize and update ReSukiSU submodule
        git submodule update --init --recursive drivers/kernelsu
        
        if grep -q "^obj-y += kernelsu/$" drivers/Makefile; then
          sed -i 's|^obj-y += kernelsu/$|obj-y += kernelsu/kernel/|' drivers/Makefile
        elif ! grep -q "^obj-y += kernelsu/kernel/$" drivers/Makefile; then
          echo "obj-y += kernelsu/kernel/" >> drivers/Makefile
        fi
        
        echo "[+] Done."

    - name: Compile Kernel
      run: |
        mv toolchain_repo/gcc ${{ github.workspace }}/gcc
        rm -rf toolchain_repo
        
        export ARCH=arm64
        export CROSS_COMPILE=${{ github.workspace }}/gcc/gcc-arm64-gcc-master/bin/aarch64-elf-
        export CROSS_COMPILE_ARM32=${{ github.workspace }}/gcc/gcc-arm-gcc-master/bin/arm-eabi-
        
        cd source
        make cas_defconfig
        make -j$(nproc --all)

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: ${{ github.workspace }}/source/arch/arm64/boot/Image
