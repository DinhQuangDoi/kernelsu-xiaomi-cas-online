name: (Clang)Kernel Builder Xiaomi 10 Ultra

on: 
  workflow_dispatch:
    inputs:
      TOOLCHAIN_URL:
        description: 'Clang Toolchain Git URL'
        required: false
        default: 'https://gitlab.com/provasishh/clang-20.git'
      ANYKERNEL_URL:
        description: 'AnyKernel3 Git URL (optional)'
        required: false
        default: ''

env:
  TOOLCHAIN_URL: ${{ github.event.inputs.TOOLCHAIN_URL || 'https://gitlab.com/provasishh/clang-20.git' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        repository: DinhQuangDoi/android_kernel_xiaomi_cas
        ref: ksu
        path: kernel
        fetch-depth: 0

    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential bc cpio \
            llvm clang bison flex libssl-dev libfl-dev \
            curl git wget python3 python3-pip \
            zip unzip tar gzip \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Download and Patch Kernel Source
      run: |
        cd ${{ github.workspace }}/kernel
        
        # Setup KSU submodule
        git submodule update --init --recursive drivers/kernelsu
        
        # Fix Makefile for submodule path
        if grep -q "^obj-y += kernelsu/$" drivers/Makefile; then
          sed -i 's|^obj-y += kernelsu/$|obj-y += kernelsu/kernel/|' drivers/Makefile
        elif ! grep -q "^obj-y += kernelsu/kernel/$" drivers/Makefile; then
          echo "obj-y += kernelsu/kernel/" >> drivers/Makefile
        fi
        
        # Ensure KSU Kconfig is sourced
        if ! grep -q 'source "drivers/kernelsu/kernel/Kconfig"' drivers/Kconfig; then
          echo 'source "drivers/kernelsu/kernel/Kconfig"' >> drivers/Kconfig
        fi
        
        # Enable KSU configs
        curl -sLO "https://raw.githubusercontent.com/DinhQuangDoi/android_kernel_xiaomi_cas/ksu/ksu.config"
        scripts/kconfig/merge_config.sh arch/arm64/configs/cas_defconfig ksu.config
        make olddefconfig
        
        echo "[+] Kernel source patched successfully"

    - name: Clone Toolchain
      run: |
        cd ${{ github.workspace }}
        echo "--- Cloning Toolchain ---"
        git clone --depth=1 ${{ env.TOOLCHAIN_URL }} tc
        ls -la tc/

    - name: Compile Kernel with Clang
      run: |
        cd ${{ github.workspace }}/kernel
        
        # Setup toolchain paths
        export PATH="${{ github.workspace }}/tc/clang/bin:$PATH"
        export CLANG_BIN="${{ github.workspace }}/tc/clang/bin/clang"
        export CROSS_COMPILE="${{ github.workspace }}/tc/aarch64-linux-android-4.9/bin/aarch64-linux-android-"
        export CROSS_COMPILE_ARM32="${{ github.workspace }}/tc/arm-linux-gnueabi/bin/arm-linux-gnueabi-"
        
        # Verify toolchain
        echo "--- Clang Version ---"
        $CLANG_BIN --version
        echo ""
        echo "--- GCC Version ---"
        $CROSS_COMPILE-gcc --version | head -1
        
        # Build environment
        export ARCH=arm64
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export LLVM=1
        export LLVM_IAS=1
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export LD=llvm-ld
        
        # Start build
        echo ""
        echo "--- Building Kernel ---"
        make -j$(nproc --all) 2>&1 | tee build.log

    - name: Check Build Status
      run: |
        if grep -q "Error\|error:\|FAILED" ${{ github.workspace }}/kernel/build.log; then
          echo "--- Build Failed - Last 100 lines ---"
          tail -100 ${{ github.workspace }}/kernel/build.log
          exit 1
        else
          echo "--- Build Successful ---"
          ls -la ${{ github.workspace }}/kernel/arch/arm64/boot/Image
        fi

    - name: Upload Image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Image-Clang
        path: ${{ github.workspace }}/kernel/arch/arm64/boot/Image

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: ${{ github.workspace }}/kernel/build.log
        
